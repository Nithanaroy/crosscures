<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 1 MVP - Adaptive Questionnaire Demo</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/tree.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Pre-Visit Health Check-In</h1>
            <p>Adaptive Questionnaire Demo - Stage 1 MVP</p>
        </div>

        <div class="content">
            <div id="patientSection" class="section active">
                <h2 style="margin-bottom: 20px;">Select a Patient</h2>
                <div class="data-source-info" id="dataSourceInfo">Loading data source...</div>
                <div class="mode-toggle" id="modeToggle">
                    <span class="mode-label">Generator:</span>
                    <button class="mode-btn active" data-mode="static" onclick="window._selectMode('static')">Static</button>
                    <button class="mode-btn" data-mode="llm" onclick="window._selectMode('llm')">LLM</button>
                </div>
                <div class="model-select-row" id="modelSelectRow" style="display:none;">
                    <span class="mode-label">Model:</span>
                    <select id="modelSelect" class="model-select" onchange="window._selectModel(this.value)">
                    </select>
                </div>
                <div id="patientList" class="patient-list">
                    <div class="loading"><div class="spinner"></div> Loading patients...</div>
                </div>
            </div>

            <div id="questionnaireSection" class="section">
                <div class="patient-banner" id="patientBanner" style="display:none;">
                    <div class="patient-banner-left">
                        <div class="patient-banner-name" id="bannerName"></div>
                        <div class="patient-banner-id" id="bannerId"></div>
                        <div class="patient-banner-tags" id="bannerConditions"></div>
                        <div class="patient-banner-meds" id="bannerMeds"></div>
                    </div>
                    <button class="tree-toggle-btn" id="treeToggleBtn" onclick="window._toggleTreePanel()">Show Tree</button>
                </div>

                <div class="questionnaire-layout">
                    <div class="questionnaire-main">
                        <div class="question-header">
                            <div>
                                <h2 id="questionNumber"></h2>
                                <div class="progress-bar">
                                    <div class="progress-fill" id="progressFill"></div>
                                </div>
                            </div>
                        </div>
                        <div class="voice-controls" id="voiceControls" style="display:none;">
                            <div class="voice-controls-row">
                                <button class="btn secondary" id="voiceToggleBtn" onclick="window._toggleVoiceMode()">Enable Voice</button>
                                <button class="btn secondary" id="voiceListenBtn" onclick="window._startVoiceInput()" disabled>Speak Answer</button>
                                <button class="btn secondary" id="voiceReadBtn" onclick="window._speakCurrentQuestion()" disabled>Read Question</button>
                            </div>
                            <div class="voice-status" id="voiceStatus">Voice mode is off.</div>
                        </div>
                        <div class="question-text" id="questionText"></div>
                        <div id="answerContainer"></div>
                        <div class="navigation">
                            <button class="btn secondary" onclick="window._backToPatients()">Back</button>
                            <button class="btn primary" id="nextBtn" onclick="window._submitResponse()" style="display: none;">Next</button>
                            <button class="btn primary" id="completeBtn" onclick="window._completeQuestionnaire()" style="display: none;">Complete</button>
                        </div>
                    </div>

                    <div class="tree-panel" id="treePanel">
                        <div class="tree-panel-header"><span>Decision Tree</span></div>
                        <div id="treeContent"></div>
                        <div class="tree-legend">
                            <div class="tree-legend-item"><div class="tree-legend-dot" style="background:#4caf50;"></div> Answered</div>
                            <div class="tree-legend-item"><div class="tree-legend-dot" style="background:#667eea;"></div> Current</div>
                            <div class="tree-legend-item"><div class="tree-legend-dot" style="background:#e0e0e0;"></div> Skipped</div>
                            <div class="tree-legend-item"><div class="tree-legend-dot" style="background:white;border:2px solid #ddd;"></div> Upcoming</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="summarySection" class="section">
                <h2 style="margin-bottom: 20px;">Check-In Complete</h2>
                <div class="success" id="summaryMessage"></div>
                <div class="summary-content" id="summaryContent"></div>
                <div class="navigation" style="margin-top: 20px;">
                    <button class="btn secondary" onclick="window._startOver()">Start Over</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-overlay-content">
            <div class="spinner-large"></div>
            <div class="loading-overlay-text" id="loadingOverlayText">Processing...</div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
